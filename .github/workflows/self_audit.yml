name: Self-Audit (EU AI Act Compliance Check)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run AI Act Guardian
        run: python compliance_engine.py

      - name: Upload Certificate
        uses: actions/upload-artifact@v4
        with:
          name: compliance-certificate
          path: CANONICAL_CERTIFICATE_*.md
